version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

  myapp:
    build: .
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://user:password@db/mydatabase

volumes:
  db_data: